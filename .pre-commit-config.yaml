exclude: "^external/"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-added-large-files
        exclude: "website/public/.*|package-lock.json|bun.lockb|poetry\\.lock|uv.lock"
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: requirements-txt-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: jupyter-clear-output
        name: jupyter-clear-output
        files: \.ipynb$
        stages: [pre-commit]
        language: system
        entry: jupyter nbconvert --ClearOutputPreprocessor.enabled=True --inplace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uvx ty check
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: docent_core/_web/node_modules/.bin/prettier --write
        language: system
        files: ^docent_core/_web/.*\.(ts|tsx|js|jsx)$
        pass_filenames: true
      - id: eslint
        name: eslint
        entry: bash -c 'cd docent_core/_web && bun run lint-fix'
        language: system
        files: ^docent_core/_web/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
