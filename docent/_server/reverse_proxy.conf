upstream backend_servers {
    # IP hash ensures the same client IP always goes to the same server
    ip_hash;

    # First server at 150.136.90.38
    server 150.136.90.38:8000;
    server 150.136.90.38:8888;
    server 150.136.90.38:8889;

    # Second server at 129.213.81.70
    server 129.213.81.70:8000;
    server 129.213.81.70:8888;
    server 129.213.81.70:8889;
}

server {
    listen 80;
    server_name docent-server-2.transluce.org;

    # We'll set up HTTP first, then add HTTPS after obtaining certificates
    location / {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Certbot will add a location block here for certificate validation
	# You should re-run certbot to update the certificate, I won't include that code here
}
