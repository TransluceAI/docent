include:
  - docker-compose-db.yml

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: docent_backend
    ports:
      - "${DOCENT_SERVER_PORT:-8888}:${DOCENT_SERVER_PORT:-8888}"
    depends_on:
      - postgres
      - redis
    # Uncomment to forward SSH agent to the container
    # volumes:
    #   - ${SSH_AUTH_SOCK}:/ssh-agent
    # environment:
    #   - SSH_AUTH_SOCK=/ssh-agent
    command: bash -c "ENV_RESOLUTION_STRATEGY=os_environ DOCENT_PG_HOST=postgres DOCENT_REDIS_HOST=redis DOCENT_LLM_CACHE_PATH=/app/llm_cache docent_core server --port ${DOCENT_SERVER_PORT:-8888} --workers 8"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: docent_frontend
    ports:
      - "${DOCENT_WEB_PORT:-3000}:${DOCENT_WEB_PORT:-3000}"
    depends_on:
      - backend
    command: docent_core web --build --no-install --port ${DOCENT_WEB_PORT:-3000} --backend-url ${DOCENT_HOST:-http://localhost}:${DOCENT_SERVER_PORT:-8888} --internal-backend-url http://backend:${DOCENT_SERVER_PORT:-8888}
    restart: unless-stopped
